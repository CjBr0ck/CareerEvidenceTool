<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Career Evidence Tool</title>
  <meta name="description" content="Інструмент для збору доказової бази професійних досягнень.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="masthead">
      <p class="eyebrow">Робота в процесі</p>
      <h1>Career Evidence Tool</h1>
      <p class="lede">
        Місце, де досягнення перестають бути спогадами й стають записом:
        що зроблено, коли, з яким результатом і чим це підтверджено.
      </p>
    </header>

    <section class="status" aria-label="Статус проекту">
      <dl>
        <div>
          <dt>Стан</dt>
          <dd>Каркас</dd>
        </div>
        <div>
          <dt>Стек</dt>
          <dd>HTML · CSS · JS</dd>
        </div>
        <div>
          <dt>Деплой</dt>
          <dd>GitHub Pages</dd>
        </div>
      </dl>
    </section>

    <footer class="foot">
      <span id="build">—</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
